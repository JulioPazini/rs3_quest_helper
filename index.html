<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Alt1 Quest Helper</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="icon" href="icon.png" />

    <link rel="stylesheet" href="src/styles/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_back,arrow_forward,close,description,g_translate,hourglass_top,image_search,keyboard_arrow_down,keyboard_arrow_up,list,list_alt,map,my_location,open_in_new,person,restart_alt,search,settings,visibility,visibility_off&display=block"
    />

    <!-- Alt1 API -->
    <script src="https://runeapps.org/alt1lib/alt1lib.js"></script>
  </head>
  <body>
    <header>
      <h2>Quest Helper</h2>
      <button
        id="settingsButton"
        class="settings-button"
        type="button"
        title="Open settings"
        aria-label="Open settings"
        aria-expanded="false"
        aria-controls="settingsPanel"
      >
        <span class="material-symbols-outlined">settings</span>
      </button>
    </header>

    <section id="settingsPanel" class="settings-modal hidden" aria-hidden="true">
      <div
        class="settings-modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settingsModalTitle"
      >
        <div class="settings-modal-header">
          <h3 id="settingsModalTitle">Settings</h3>
          <button
            id="settingsCloseButton"
            class="settings-close-button"
            type="button"
            title="Close settings"
            aria-label="Close settings"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <label
          id="sequentialStepToggleWrap"
          class="settings-toggle"
          title="When enabled, checking a step also checks previous steps"
        >
          <input id="sequentialStepToggle" class="overview-check substep-check" type="checkbox" />
          <span>Sequential step marking</span>
        </label>
        <label
          id="autoTranslateToggleWrap"
          class="settings-toggle"
          title="Automatically translate quest steps when opening Steps view"
        >
          <input id="autoTranslateToggle" class="overview-check substep-check" type="checkbox" />
          <span>Auto-translate steps to PT-BR</span>
        </label>
        <label
          id="confirmResetToggleWrap"
          class="settings-toggle"
          title="Ask confirmation before resetting quest progress"
        >
          <input id="confirmResetToggle" class="overview-check substep-check" type="checkbox" />
          <span>Confirm before reset</span>
        </label>
        <label
          id="sectionImagesModalToggleWrap"
          class="settings-toggle"
          title="Show section images/maps in a collapsible block from the section header"
        >
          <input
            id="sectionImagesModalToggle"
            class="overview-check substep-check"
            type="checkbox"
          />
          <span>Section images/maps collapse</span>
        </label>
        <label class="settings-select-row" for="stepFontSizeSelect" title="Choose steps font size">
          <span>Steps font size</span>
          <select id="stepFontSizeSelect" class="settings-select">
            <option value="small">Small</option>
            <option value="medium" selected>Medium</option>
            <option value="large">Large</option>
          </select>
        </label>
        <label class="settings-select-row" for="themeSelect" title="Choose app color theme">
          <span>Theme</span>
          <select id="themeSelect" class="settings-select">
            <option value="classic" selected>Classic</option>
            <option value="classic-light">Classic Light</option>
            <option value="midnight">Midnight</option>
            <option value="ocean">Ocean</option>
          </select>
        </label>
      </div>
    </section>

    <section class="toggle-bar">
      <select id="questFilter" class="quest-Filter" aria-label="Filter quests">
        <option value="alphabetical" selected>Alphabetical</option>
        <option value="combat">Combat</option>
        <option value="membership">Free/Members</option>
        <option value="length">Length</option>
        <option value="progress">Progress</option>
        <option value="series">Series</option>
      </select>
      <div class="quest-search-field">
        <span class="material-symbols-outlined quest-search-icon" aria-hidden="true">search</span>
        <input type="text" id="questInput" class="search-input" placeholder="Type the quest name" />
        <button
          id="searchToggle"
          class="search-toggle"
          type="button"
          title="Search another quest"
          aria-label="Search another quest"
        >
          Search
        </button>
      </div>
    </section>

    <section class="player-bar">
      <div class="player-lookup-field">
        <span class="material-symbols-outlined player-lookup-icon" aria-hidden="true">person</span>
        <input
          type="text"
          id="playerInput"
          class="player-input"
          placeholder="Display name"
          aria-label="Search quests by player name"
        />
        <button
          id="playerLookup"
          class="player-lookup-btn"
          type="button"
          title="Search player quests"
          aria-label="Search player quests"
        >
          Search
        </button>
      </div>
    </section>

    <section id="questTitle"></section>

    <section id="viewModeToggle" class="view-mode-toggle hidden">
      <button
        id="backButton"
        class="toggle hidden"
        type="button"
        title="Back to quests"
        aria-label="Back to quests"
      >
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <span class="mode-label">Overview</span>
      <button id="viewStepsToggle" class="nav-btn" type="button">
        <span class="material-symbols-outlined">list</span>
        <span class="view-toggle-label">Steps</span>
      </button>
    </section>

    <section class="nav-bar hidden">
      <div class="nav-left">
        <button
          id="toggleAll"
          class="toggle switch-toggle"
          type="button"
          title="Show all quest steps"
          aria-pressed="false"
          aria-label="Show all quest steps"
        >
          <span class="material-symbols-outlined">list_alt</span>
        </button>
        <button
          id="hideCompleted"
          class="filter-toggle hidden"
          type="button"
          title="Hide completed steps from the list"
          aria-pressed="false"
          aria-label="Hide completed steps from the list"
        >
          <span class="material-symbols-outlined">visibility</span>
        </button>
        <button
          id="settingsButtonQuest"
          class="settings-button nav-settings-button"
          type="button"
          title="Open settings"
          aria-label="Open settings"
          aria-expanded="false"
          aria-controls="settingsPanel"
        >
          <span class="material-symbols-outlined">settings</span>
        </button>
        <button
          id="questTranslateButton"
          class="nav-settings-button nav-translate-button hidden"
          type="button"
          title="Translate quest steps to PT-BR"
          aria-label="Translate quest steps to PT-BR"
        >
          <span class="material-symbols-outlined">g_translate</span>
        </button>
      </div>
    </section>

    <section id="progressRow">
      <span id="progressIndicator" class="progress-indicator hidden">0 / 0</span>
    </section>

    <section id="questOverview" class="quest-overview hidden"></section>

    <section id="searchResults" class="results-list hidden"></section>

    <section id="steps"></section>

    <section id="stickyBar" class="sticky-bar hidden">
      <button
        id="resetQuest"
        class="nav-btn sticky-action-btn"
        type="button"
        title="Reset all step progress for this quest"
        aria-label="Reset all step progress for this quest"
      >
        <span class="material-symbols-outlined">restart_alt</span>
      </button>
      <a id="wikiLink" class="wiki-link" href="#" target="_blank" rel="noopener">Wiki</a>
      <button
        id="prevStep"
        class="nav-btn sticky-action-btn"
        type="button"
        title="Mark the previous step as not completed"
        aria-label="Mark the previous step as not completed"
      >
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <button
        id="nextStep"
        class="nav-btn sticky-action-btn"
        type="button"
        title="Mark the current step as completed and move forward"
        aria-label="Mark the current step as completed and move forward"
      >
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
      <button
        id="jumpCurrent"
        class="nav-btn sticky-action-btn jump-current-btn hidden"
        type="button"
        title="Jump to the current step in the list"
        aria-label="Jump to the current step in the list"
      >
        <span class="material-symbols-outlined">my_location</span>
      </button>
    </section>
    <button
      id="scrollTopButton"
      class="scroll-top-btn hidden"
      type="button"
      title="Scroll to top"
      aria-label="Scroll to top"
    >
      <span class="material-symbols-outlined">keyboard_arrow_up</span>
    </button>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
